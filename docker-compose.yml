version: '3.8'

services:
  # =========================================
  # PIC Server — photo upload & serving
  # =========================================
  picserver:
    build:
      context: ./picserver
      dockerfile: Dockerfile
    container_name: elpass-local-picserver
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - photos:/data
    networks:
      - elpass-local

  # =========================================
  # Backend API
  # =========================================
  terminals-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elpass-syncer-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      ELPASS_API_URL: http://postgrest:3000
      PIC_SERVER: http://picserver:9000/pic
    volumes:
      - ./logs:/app/logs
    depends_on:
      picserver:
        condition: service_started
    networks:
      - elpass-local
      - nginx

volumes:
  photos:

networks:
  elpass-local:
    driver: bridge
  nginx:
    external: true
