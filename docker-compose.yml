version: '3.8'

services:
  # =========================================
  # Backend API
  # =========================================
  terminals-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elpass-syncer-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      ELPASS_API_URL: http://postgrest:3000
      PHOTOS_DIR: /app/photos
    volumes:
      - ./logs:/app/logs
      - elpass-photos:/app/photos
    networks:
      - nginx

volumes:
  elpass-photos:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/elpass/dockers-onpremise/elpass-photos

networks:
  nginx:
    external: true
